<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker | Login</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
 
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

<div class="bg-white w-[380px] rounded-lg shadow-lg p-8">

<div class="flex justify-center mb-4">

<div class="bg-gray-800 w-16 h-16 rounded-full flex items-center justify-center">

<svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" class="w-8 h-8">
<path d="M12 .5C5.73.5.9 5.33.9 11.6c0 4.9 3.18 9.05 7.6 10.52.56.1.76-.24.76-.53v-1.87c-3.1.67-3.75-1.3-3.75-1.3-.5-1.27-1.24-1.6-1.24-1.6-1.02-.7.08-.69.08-.69 1.13.08 1.72 1.16 1.72 1.16 1.01 1.73 2.65 1.23 3.3.94.1-.73.4-1.23.72-1.52-2.47-.28-5.07-1.23-5.07-5.48 0-1.21.43-2.2 1.15-2.98-.12-.28-.5-1.42.1-2.96 0 0 .94-.3 3.07 1.14a10.6 10.6 0 0 1 5.6 0c2.12-1.44 3.06-1.14 3.06-1.14.6 1.54.22 2.68.1 2.96.72.78 1.15 1.77 1.15 2.98 0 4.26-2.6 5.2-5.08 5.47.42.36.8 1.08.8 2.18v3.23c0 .3.2.64.77.53 4.41-1.47 7.59-5.62 7.59-10.52C23.1 5.33 18.27.5 12 .5z"/>
</svg>

</div>

</div>

<h2 class="text-center text-xl font-semibold">
GitHub Issues Tracker
</h2>

<p class="text-center text-gray-500 text-sm mb-6">
Sign in to manage your issues
</p>

<form id="loginForm">

<label class="text-sm font-medium">Username</label>

<input
id="userInput"
type="text"
placeholder="Enter Username"
class="w-full border rounded-md px-3 py-2 mt-1 mb-1 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
required
/>

<p class="text-xs text-purple-700 mb-4">
Default: admin
</p>

<label class="text-sm font-medium">Password</label>

<input
id="passInput"
type="password"
placeholder="Enter Password"
class="w-full border rounded-md px-3 py-2 mt-1 mb-1 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
required
/>

<p class="text-xs text-purple-700 mb-4">
Default: admin123
</p>

<button href ="index.html"
type="submit"
class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-2 rounded-md font-medium hover:opacity-90">

Sign In

</button>

</form>

<div class="text-center text-gray-400 text-sm my-4">
OR
</div>

<div class="bg-gray-100 text-center text-sm p-3 rounded-md">

<p class="text-gray-500 mb-1">
Demo Credentials:
</p>

<p>Username: <b>admin</b></p>
<p>Password: <b>admin123</b></p>

</div>

</div>

<script>

const form=document.getElementById("loginForm");

const usernameField=document.getElementById("userInput");

const passwordField=document.getElementById("passInput");

form.addEventListener("submit",function(event){

event.preventDefault()

const usernameValue=usernameField.value.trim()

const passwordValue=passwordField.value.trim()

if(usernameValue==="admin" && passwordValue==="admin123"){

window.location.href="home.html"

} else{

alert("Wrong username or password")

}

});

</script>

</body>
</html>
